<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hostify</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f19;
        color: #fff;
    }

    .container {
        display: flex;
        height: 100vh;
    }

    .sidebar {
        width: 320px;
        background: #111827;
        padding: 20px;
        overflow-y: auto;
    }

    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding:20px;
        background-color: whitesmoke;
    }

    .preview {
        flex: 1;
        border: none;
        width: 100%;
        background: white;
        border-radius: 20px;
        box-shadow: 0px 0px 10px 4px #0002;
    }

    h2 {
        margin-top: 0;
    }

    input, select, button, input[type="file"]::file-selector-button{
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: none;
        font-size: 14px;
    }

    button {
        background: #3b82f6;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #2563eb;
    }

    .site {
        padding: 10px;
        background: #1f2937;
        margin-bottom: 8px;
        border-radius: 6px;
        cursor: pointer;
    }

    .site:hover {
        background: #374151;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    .small {
        font-size: 12px;
        opacity: 0.8;
    }

    input[type="file"]::file-selector-button {
        padding: 10px;
        width: fit-content;
        margin-right: 8px;
        border-radius: 6px;
        border: none;
        font-size: 14px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
    }

    input[type="file"]::file-selector-button:hover {
        background: #2563eb;
    }

    .button-group {
  display: inline-flex;
  align-items: stretch;
  width: 100%;
}

.button-group button {
  border: 1px solid #334155;
  background: #1e293b;
  color: white;
  padding: 10px 16px;
  cursor: pointer;
  margin: 0;
  border-radius: 0;
  position: relative;
}

/* Prevent double borders */
.button-group button:not(:first-child) {
  margin-left: -1px;
}

/* Leftmost button */
.button-group button:first-child {
  border-top-left-radius: 12px;
  border-bottom-left-radius: 12px;
}

/* Rightmost button */
.button-group button:last-child {
  border-top-right-radius: 12px;
  border-bottom-right-radius: 12px;
}

/* Hover */
.button-group button:hover {
  background: #334155;
  z-index: 1;
}

/* Active */
.button-group button.active {
  background: #2563eb;
  border-color: #2563eb;
  z-index: 2;
}
.hidden, .message-overlay.hidden, .loading-overlay.hidden {
  display: none;
}
    .loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}



.loading-box {
  background: #0f172a;
  padding: 24px 28px;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  min-width: 160px;
  color: white;
  font-family: Arial, sans-serif;
}

.loading-text {
  font-size: 14px;
  opacity: 0.9;
}

/* Spinner */
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #334155;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
.message-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.message-box {
  background: #0f172a;
  color: white;
  padding: 20px;
  border-radius: 16px;
  width: 320px;
  max-width: 90%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  font-family: Arial, sans-serif;
}

.message-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

.message-body {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 16px;
}

.message-actions {
  display: flex;
  justify-content: flex-end;
}

.message-actions button {
  background: #2563eb;
  border: none;
  padding: 8px 14px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}
    
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Hostify</h2>

        

        <div style="padding-right: 20px; margin-bottom: 8px;">
            <input id="siteName" placeholder="Site name"/>

            
        </div>
        <div class="button-group">
            <button id="zipButton" onclick="toggleUploadType(true)">Upload Zip File</button>
            <button id="folderButton" class="active" onclick="toggleUploadType(false)">Upload Folder</button>
        </div>
        <input type="file" id="zip" class="hidden" accept=".zip"/>

        <input type="file" id="folder" webkitdirectory directory multiple/>
        <button onclick="uploadSite()">Deploy Site</button>

        <hr />

        <h3>Sites</h3>
        <div id="sites"></div>

        <hr />

        <div id="homepageDiv" class="hidden">
            <h3>Homepage</h3>
            <select id="htmlFiles"></select>
            <button onclick="setHome()">Set as homepage</button>

            <div class="small" id="currentSiteLabel"></div>
        </div>
    </div>

    <!-- MAIN PREVIEW -->
    <div class="main">
        <iframe id="preview" class="preview"></iframe>
    </div>

</div>
    <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-box">
        <div class="spinner"></div>
        <div class="loading-text">Loading...</div>
    </div>
    </div>

    <div id="messageOverlay" class="message-overlay hidden">
    <div class="message-box">
        <div id="messageTitle" class="message-title">Message</div>
        <div id="messageBody" class="message-body">...</div>

        <div class="message-actions">
        <button onclick="closeMessage()">Close</button>
        </div>
    </div>
    </div>
<script>
let currentSite = null;

// ----------------------
// Load sites
// ----------------------
async function loadSites() {
    let res = await fetch("/api/sites");
    let sites = await res.json();

    let container = document.getElementById("sites");
    container.innerHTML = "";

    sites.forEach(site => {
        let div = document.createElement("div");
        div.className = "site";
        div.innerText = site;

        div.onclick = () => selectSite(site);

        container.appendChild(div);
    });
}
function showLoading() {
  const overlay = document.getElementById("loadingOverlay");
  overlay.classList.remove("hidden");
}

function hideLoading() {
  const overlay = document.getElementById("loadingOverlay");
  overlay.classList.add("hidden");
}

function showMessage(title, message) {
  document.getElementById("messageTitle").textContent = title;
  document.getElementById("messageBody").textContent = message;

  document.getElementById("messageOverlay").classList.remove("hidden");
}

function closeMessage() {
  document.getElementById("messageOverlay").classList.add("hidden");
}
// ----------------------
// Select site
// ----------------------
async function selectSite(site) {
    currentSite = site;
    removeClassIfExists(document.getElementById("homepageDiv"), "hidden");

    document.getElementById("currentSiteLabel").innerText =
        "Selected: " + site;

    document.getElementById("preview").src = "/" + site;
    showLoading();
    try {
        let res = await fetch(`/api/files/${site}`);
        let files = await res.json();

        let sel = document.getElementById("htmlFiles");
        sel.innerHTML = "";

        files.forEach(f => {
            let opt = document.createElement("option");
            opt.value = f;
            opt.innerText = f;
            sel.appendChild(opt);
        });
    } catch (e) {
        showMessage("Error", e.message);
    }
    hideLoading();
}

// ----------------------
// Upload site
// ----------------------
async function uploadSite() {
    let name = document.getElementById("siteName").value;
    let zip = document.getElementById("zip").files[0];
    let folder = document.getElementById("folder").files;

    let form = new FormData();

    form.append("name", name);

    if (zip) {
        form.append("zip", zip);
    }

    for (let f of folder) {
        form.append("files", f, f.webkitRelativePath || f.name);
    }  
    showLoading();

    try {
        await fetch("/api/upload", {
        method: "POST",
        body: form
    });
    await loadSites();
    }
    catch (e) {
        showMessage("Error", e.message);
    }

    
    hideLoading();
    showMessage("Success", "Website is now being hosted.");
}
function addClassIfMissing(element, className) {
  if (!element.classList.contains(className)) {
    element.classList.add(className);
  }
}
function removeClassIfExists(element, className) {
  if (element.classList.contains(className)) {
    element.classList.remove(className);
  }
}
function toggleUploadType(isZip) {
    if (isZip) {
        removeClassIfExists(document.getElementById("folderButton"), "active");
        removeClassIfExists(document.getElementById("zip"), "hidden");
        document.getElementById("zip").value = null;
        addClassIfMissing(document.getElementById("folder"), "hidden");
        addClassIfMissing(document.getElementById("zipButton"), "active");

    } else {
        removeClassIfExists(document.getElementById("zipButton"), "active");
        removeClassIfExists(document.getElementById("folder"), "hidden");
        document.getElementById("folder").value = null;
        addClassIfMissing(document.getElementById("zip"), "hidden");
        addClassIfMissing(document.getElementById("folderButton"), "active");
        
    }
}

    // ----------------------
    // Set homepage
    // ----------------------
    async function setHome() {
        if (!currentSite) return;

        let home = document.getElementById("htmlFiles").value;
        showLoading();
        try {
            await fetch("/api/set-home", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                site: currentSite,
                home: home
            })
        });
        } catch {
            showMessage("Error", e.message);
        }
        
        hideLoading();
        showMessage("Success", "Home page was set.");
        document.getElementById("preview").src = "/" + currentSite;
    }

    // ----------------------
    // Init
    // ----------------------
    showLoading();
    loadSites();
    hideLoading();
</script>

</body>
</html>
