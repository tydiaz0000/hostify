<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hostify</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f19;
        color: #fff;
    }

    .container {
        display: flex;
        height: 100vh;
    }

    .sidebar {
        width: 320px;
        background: #111827;
        padding: 20px;
        overflow-y: auto;
    }

    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .preview {
        flex: 1;
        border: none;
        width: 100%;
        background: white;
    }

    h2 {
        margin-top: 0;
    }

    input, select, button {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: none;
        font-size: 14px;
    }

    button {
        background: #3b82f6;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #2563eb;
    }

    .site {
        padding: 10px;
        background: #1f2937;
        margin-bottom: 8px;
        border-radius: 6px;
        cursor: pointer;
    }

    .site:hover {
        background: #374151;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    .small {
        font-size: 12px;
        opacity: 0.8;
    }
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Hostify</h2>

        <input id="siteName" placeholder="Site name"/>

        <input type="file" id="zip" accept=".zip"/>

        <input type="file" id="folder" webkitdirectory directory multiple />

        <button onclick="uploadSite()">Deploy Site</button>

        <hr />

        <h3>Sites</h3>
        <div id="sites"></div>

        <hr />

        <h3>Homepage</h3>
        <select id="htmlFiles"></select>
        <button onclick="setHome()">Set as homepage</button>

        <div class="small" id="currentSiteLabel"></div>
    </div>

    <!-- MAIN PREVIEW -->
    <div class="main">
        <iframe id="preview" class="preview"></iframe>
    </div>

</div>

<script>
let currentSite = null;

// ----------------------
// Load sites
// ----------------------
async function loadSites() {
    let res = await fetch("/api/sites");
    let sites = await res.json();

    let container = document.getElementById("sites");
    container.innerHTML = "";

    sites.forEach(site => {
        let div = document.createElement("div");
        div.className = "site";
        div.innerText = site;

        div.onclick = () => selectSite(site);

        container.appendChild(div);
    });
}

// ----------------------
// Select site
// ----------------------
async function selectSite(site) {
    currentSite = site;

    document.getElementById("currentSiteLabel").innerText =
        "Selected: " + site;

    document.getElementById("preview").src = "/" + site;

    let res = await fetch(`/api/files/${site}`);
    let files = await res.json();

    let sel = document.getElementById("htmlFiles");
    sel.innerHTML = "";

    files.forEach(f => {
        let opt = document.createElement("option");
        opt.value = f;
        opt.innerText = f;
        sel.appendChild(opt);
    });
}

// ----------------------
// Upload site
// ----------------------
async function uploadSite() {
    let name = document.getElementById("siteName").value;
    let zip = document.getElementById("zip").files[0];
    let folder = document.getElementById("folder").files;

    let form = new FormData();

    form.append("name", name);

    if (zip) {
        form.append("zip", zip);
    }

    for (let f of folder) {
        form.append("files", f, f.webkitRelativePath || f.name);
    }

    await fetch("/api/upload", {
        method: "POST",
        body: form
    });

    await loadSites();
}

// ----------------------
// Set homepage
// ----------------------
async function setHome() {
    if (!currentSite) return;

    let home = document.getElementById("htmlFiles").value;

    await fetch("/api/set-home", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            site: currentSite,
            home: home
        })
    });

    document.getElementById("preview").src = "/" + currentSite;
}

// ----------------------
// Init
// ----------------------
loadSites();
</script>

</body>
</html>
